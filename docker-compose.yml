version: '3.8'

services:
  # ==========================================
  # KOTMAN CORE LOCAL POSTGRES VAULT
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: kotman_db
    environment:
      POSTGRES_USER: kotman
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: kotman_db
      TZ: Asia/Kolkata
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ==========================================
  # LOCAL REDIS (For Rate Limiting Testing)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: kotman_redis
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

  # ==========================================
  # KOTMAN CORE WEB APP
  # ==========================================
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://kotman:${POSTGRES_PASSWORD:-secret}@postgres:5432/kotman_db?sslmode=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KOTMAN_GLOBAL_PEPPER=K0tm@n_TrU$t_N3tw0rk_P3pp3r_2026_!xZ9
      - SHOPIFY_API_SECRET=dummy
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data: